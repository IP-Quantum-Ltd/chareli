name = "game-zip-processor" # Overridden in CI with --name
main = "src/index.ts"
compatibility_date = "2026-02-24"
compatibility_flags = ["nodejs_compat"]

# Account ID should be injected via CI if possible
# but safe to commit if needed
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

############################################
# R2 Binding (Provisioned via Terraform)
############################################
[[r2_buckets]]
binding = "GAMES_BUCKET"
bucket_name = "game-assets-bucket"

############################################
# KV Namespace (Provisioned via Terraform)
############################################
[[kv_namespaces]]
binding = "GAME_STATUS"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

############################################
# Queue Consumer (Terraform attaches consumer)
# This exists so Cloudflare validates handler
############################################
[[queues.consumers]]
queue = "game-zip-queue"

############################################
# Environment Variables (Non-secret only)
############################################
BACKEND_WEBHOOK_URL = "https://api-staging.arcadesbox.com/api/internal/game-processed"
