name = "game-zip-processor" # Overridden at deploy time via --name $WORKER_NAME
main = "src/index.ts"
compatibility_date = "2026-02-24"
compatibility_flags = ["nodejs_compat"]

############################################
# KV Namespace (Provisioned via Terraform)
# ID is injected at CI time from the
# Terraform output via CLOUDFLARE_KV_NAMESPACE_ID secret
############################################
[[kv_namespaces]]
binding = "GAME_STATUS"
id = "$CLOUDFLARE_KV_NAMESPACE_ID"

# NOTE: R2, Queue bindings and env vars are managed exclusively by
# Terraform (worker.tf). They are preserved during wrangler deploy
# via --keep-vars. Do NOT define them here to avoid drift.
