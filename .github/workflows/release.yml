name: Deploy to Client Production Environment (arcadesbox)

on:
  push:
    branches: [release]
    tags:
      - "v*"

permissions:
  packages: write
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPO: ${{ vars.ECR_REPO }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
  ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_FAMILY }}
  CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            backend:
              - 'Server/**'
              - '.github/workflows/**'
            frontend:
              - 'Client/**'
              - '.github/workflows/**'

  build-and-test-backend:
    name: Build & Test Backend
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'release' && 'production' || github.ref_name == 'dev' && 'development' || github.ref_name == 'main' && 'staging' || 'development' }}
    strategy:
      matrix:
        node-version: ["22.x"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Backend (Server Prod) ---
      - name: Setup Node.js for Backend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: Server/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./Server
        run: npm ci

      - name: Lint Backend
        working-directory: ./Server
        run: npm run lint
        continue-on-error: true

      - name: Test Backend
        working-directory: ./Server
        run: npm test
        continue-on-error: true

      # --- Frontend (Client) ---
  build-and-test-frontend:
    name: Build & Test Frontend
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    environment: "${{ github.ref_name == 'release' && 'production' || github.ref_name == 'dev' && 'development' || github.ref_name == 'main' && 'staging' || 'development' }}"
    strategy:
      matrix:
        node-version: ["22.x"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: Client/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./Client
        run: npm ci

      - name: Lint Frontend
        working-directory: ./Client
        run: npm run lint
        continue-on-error: true

      - name: Test Frontend
        working-directory: ./Client
        run: npm test
        continue-on-error: true

      - name: Build Frontend
        working-directory: ./Client
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL}}
          VITE_GAMES_CDN_URL: ${{ vars.VITE_GAMES_CDN_URL}}
          VITE_OFFICIAL_DOMAIN: ${{ vars.VITE_OFFICIAL_DOMAIN }}
          VITE_PAGES_DEV_DOMAIN: ${{ vars.VITE_PAGES_DEV_DOMAIN }}
          VITE_CLOUDFLARE_ZONE: ${{ vars.VITE_CLOUDFLARE_ZONE }}
          VITE_ENABLE_CACHE_DASHBOARD: "true"
          VITE_CDN_ENABLED: ${{ vars.VITE_CDN_ENABLED }}
          VITE_CDN_BASE_URL: ${{ vars.VITE_CDN_BASE_URL }}
        run: npm run build

      - name: Archive Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./Client/dist

  deploy-backend:
    name: Deploy Backend to ECS
    needs: [detect-changes, build-and-test-backend]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'release' && 'production' || github.ref_name == 'dev' && 'development' || github.ref_name == 'main' && 'staging' || 'development' }}
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/release' &&
      needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Debug image paths
        run: |
          echo "ECR_REGISTRY= '${{ env.ECR_REGISTRY }}'"
          echo "ECR_REPO     = '${{ env.ECR_REPO }}'"
          echo "FULL IMAGE   = '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}'"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

            type=ref,event=branch,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
            type=sha,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./Server
          file: ./Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    needs: [detect-changes, build-and-test-frontend]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'release' && 'production' || github.ref_name == 'dev' && 'development' || github.ref_name == 'main' && 'staging' || 'development' }}
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/release' &&
      needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Download Frontend Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-build-output

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./frontend-build-output --project-name=${{ vars.PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge Cloudflare Cache
        run: |
          echo "Purging Cloudflare cache for zone..."
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Cache purge completed"

  deploy-worker:
    name: Deploy Game ZIP Worker to Cloudflare
    needs: [detect-changes]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'release' && 'production' || github.ref_name == 'dev' && 'development' || github.ref_name == 'main' && 'staging' || 'development' }}
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/release' &&
      needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build & Deploy Worker Script (Content Only)
        working-directory: Server/workers/game-zip-processor
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: ${{ vars.WORKER_SCRIPT_NAME }}
        run: |
          echo "🏗️ Building worker..."
          # Build specifically for production-like environment (transpiling TS to JS)
          # We use --dry-run to trigger the build process and --outdir to capture the output
          npx wrangler deploy --dry-run --outdir dist --name $WORKER_NAME

          echo "🚀 Uploading script content to Cloudflare..."
          # The `/content` endpoint updates only the script, preserving all Provisioned Bindings
          # Cloudflare usually names the bundled file index.js or worker.js
          BUNDLE_FILE=$(find dist -name "*.js" | head -n 1)

          if [ -z "$BUNDLE_FILE" ]; then
            echo "❌ Error: Could not find bundled script in dist/"
            exit 1
          fi

          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$WORKER_NAME/content" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/javascript+module" \
               --data-binary "@$BUNDLE_FILE"

          echo "✅ Worker script updated successfully (bindings preserved)"

  notify-discord:
    name: Notify Discord
    needs:
      [
        detect-changes,
        build-and-test-backend,
        deploy-frontend,
        deploy-backend,
        deploy-worker,
      ]
    environment: ${{ github.ref_name == 'release' && 'production' || github.ref_name == 'dev' && 'development' || github.ref_name == 'main' && 'staging' || 'development' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/release' }}

    steps:
      - name: Generate Build Status
        id: build-status
        run: |
          backend_result="${{ needs.build-and-test-backend.result }}"
          frontend_result="${{ needs.build-and-test-frontend.result }}"
          backend_changed="${{ needs.detect-changes.outputs.backend }}"
          frontend_changed="${{ needs.detect-changes.outputs.frontend }}"

          # Backend status
          if [[ "$backend_changed" == "false" ]]; then
            echo "backend_build_msg=⏭️ Backend build SKIPPED (no changes)" >> $GITHUB_OUTPUT
          elif [[ "$backend_result" == "success" ]]; then
            echo "backend_build_msg=✅ Backend build & test PASSED" >> $GITHUB_OUTPUT
          else
            echo "backend_build_msg=❌ Backend build & test FAILED" >> $GITHUB_OUTPUT
          fi

          # Frontend status
          if [[ "$frontend_changed" == "false" ]]; then
            echo "frontend_build_msg=⏭️ Frontend build SKIPPED (no changes)" >> $GITHUB_OUTPUT
          elif [[ "$frontend_result" == "success" ]]; then
            echo "frontend_build_msg=✅ Frontend build & test PASSED" >> $GITHUB_OUTPUT
          else
            echo "frontend_build_msg=❌ Frontend build & test FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Generate Backend Deploy Status
        id: backend-status
        run: |
          if [[ "${{ needs.deploy-backend.result }}" == "success" ]]; then
            echo "backend_msg=:white_check_mark: Backend deployment to ECS SUCCESSFUL" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy-backend.result }}" == "skipped" ]]; then
            echo "backend_msg=:warning: Backend deployment SKIPPED" >> $GITHUB_OUTPUT
          else
            echo "backend_msg=:x: Backend deployment to ECS FAILED" >> $GITHUB_OUTPUT
          fi
      - name: Generate Frontend Deploy Status
        id: frontend-status
        run: |
          if [[ "${{ needs.deploy-frontend.result }}" == "success" ]]; then
            echo "frontend_msg=:white_check_mark: Frontend deployment to Cloudflare Pages SUCCESSFUL" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy-frontend.result }}" == "skipped" ]]; then
            echo "frontend_msg=:warning: Frontend deployment SKIPPED" >> $GITHUB_OUTPUT
          else
            echo "frontend_msg=:x: Frontend deployment to Cloudflare Pages FAILED" >> $GITHUB_OUTPUT
          fi
      - name: Notify Discord
        if: always()
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: ArcadesBox Release Pipeline Bot
          message: |
            🚀 **ArcadesBox Production Deployment Summary(Client Account)**
            🔀 Branch: `${{ github.ref_name }}`
            📄 Commit: `${{ github.event.head_commit.message }}` by `${{ github.actor }}`
            🏗️ Event: `${{ github.event_name }}`
            🧪 **Build & Test:** ${{ steps.build-status.outputs.build_msg }}
            🖥️ **Backend (ECS):** ${{ steps.backend-status.outputs.backend_msg }}
            🌐 **Frontend (Cloudflare Pages):** ${{ steps.frontend-status.outputs.frontend_msg }}
            🔗 [View Run on GitHub](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            🔗 [View site here](${{ vars.APP_URL }})
